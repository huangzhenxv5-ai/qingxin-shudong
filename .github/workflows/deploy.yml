name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_LLM_API_BASE: ${{ secrets.VITE_LLM_API_BASE }}
          VITE_LLM_API_KEY: ${{ secrets.VITE_LLM_API_KEY }}
          VITE_LLM_MODEL: ${{ secrets.VITE_LLM_MODEL }}
          VITE_IMAGE_GEN_API_BASE: ${{ secrets.VITE_IMAGE_GEN_API_BASE }}
          VITE_IMAGE_GEN_API_KEY: ${{ secrets.VITE_IMAGE_GEN_API_KEY }}
          VITE_IMAGE_GEN_MODEL: ${{ secrets.VITE_IMAGE_GEN_MODEL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
